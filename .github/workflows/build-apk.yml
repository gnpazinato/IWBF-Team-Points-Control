name: Build Android APK

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Generate Android project files
        run: |
          flutter create . \
            --project-name iwbf_team_points_control \
            --org com.iwbf \
            --platforms=android \
            --description "IWBF Team Points Control"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with version
        id: apk
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          BASENAME="iwbf-team-points-control-version-${VERSION}"
          cp "build/app/outputs/flutter-apk/app-release.apk" \
             "build/app/outputs/flutter-apk/${BASENAME}.apk"
          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"
          echo "path=build/app/outputs/flutter-apk/${BASENAME}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.basename }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30
