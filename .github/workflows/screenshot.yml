name: Screenshot (manual)

# Workflow temporário para gerar o print da Home (manual do usuário).
# Roda só nesta branch de trabalho e é DELETADO antes do merge na main.
on:
  push:
    branches:
      - claude/online-link-refresh-fix
  workflow_dispatch:

jobs:
  shot:
    name: Render Home screenshot
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        run: |
          flutter create . \
            --project-name iwbf_team_points_control \
            --org com.iwbf \
            --platforms=android \
            --description "IWBF Team Points Control"

      - name: Install dependencies
        run: flutter pub get

      - name: Render Home screenshot
        run: flutter test test/screenshots/home_screenshot.dart

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: home-screenshot
          path: test/screenshots/home.png
          if-no-files-found: error
          retention-days: 7
