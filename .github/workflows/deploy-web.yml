name: Deploy Web (GitHub Pages + Cloudflare Pages)

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Flutter Web (GitHub Pages)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Generate web project files
        run: |
          flutter create . \
            --project-name iwbf_team_points_control \
            --org com.iwbf \
            --platforms=web \
            --description "IWBF Team Points Control"

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release --base-href "/IWBF-Team-Points-Control/"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  cloudflare-pages:
    name: Build and Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate web project files
        run: |
          flutter create . \
            --project-name iwbf_team_points_control \
            --org com.iwbf \
            --platforms=web \
            --description "IWBF Team Points Control"

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release (CF Pages — root base-href)
        run: flutter build web --release

      - name: Ensure Cloudflare Pages project exists
        run: |
          if npx --yes wrangler@latest pages project list | grep -q "iwbf-team-points-control"; then
            echo "Project iwbf-team-points-control already exists."
          else
            echo "Project not found — creating..."
            npx --yes wrangler@latest pages project create iwbf-team-points-control \
              --production-branch=claude/review-and-continue-9ZK5v
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          npx --yes wrangler@latest pages deploy build/web \
            --project-name=iwbf-team-points-control \
            --branch="${GITHUB_REF_NAME}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${GITHUB_SHA:0:7} via Actions"
