name: iwbf_team_points_control
description: "IWBF Team Points Control — app offline para comissários conferirem pontos de classificação funcional em quadra."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  excel: ^4.0.6
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  vibration: ^2.0.0
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  package_info_plus: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
